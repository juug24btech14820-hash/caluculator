<!DOCTYPE html>
<html>
<head>
    <title>Hacker Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>⚡ Task Terminal</h1>

    <input type="text" id="taskInput" placeholder="> Enter command...">
    <p id="message"></p>

    <button onclick="addTask()">Execute</button>
    <button onclick="clearAll()">Clear Logs</button>

    <h3 id="count">0 Tasks</h3>

    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
